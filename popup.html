<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fingerprint Spoofing</title>
    <style>
        :root {
            --bg-color: #090e17;
            --grid-color: rgba(0, 229, 255, 0.05);
            --primary: #00E5FF;
            --primary-glow: rgba(0, 229, 255, 0.4);
            --secondary: #00FF41;
            --danger: #FF0055;
            --warning: #ffb74d;
            --purple: #B300FF;
            --panel-bg: rgba(13, 20, 36, 0.8);
            --border: #1f2937;
            --text-main: #c9d1d9;
            --text-muted: #8b949e;
            --input-bg: rgba(0, 0, 0, 0.4);
            --btn-hover-text: #000;
        }

        body.light-theme {
            --bg-color: #f0f4f8;
            --grid-color: rgba(0, 150, 255, 0.1);
            --primary: #0277bd;
            --primary-glow: rgba(2, 119, 189, 0.4);
            --secondary: #2e7d32;
            --danger: #c62828;
            --warning: #ef6c00;
            --purple: #6a1b9a;
            --panel-bg: rgba(255, 255, 255, 0.85);
            --border: #b0bec5;
            --text-main: #263238;
            --text-muted: #546e7a;
            --input-bg: rgba(255, 255, 255, 0.9);
            --btn-hover-text: #fff;
        }

        body {
            font-family: 'Consolas', 'Courier New', monospace;
            background-color: var(--bg-color);
            background-image:
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 15px 15px;
            color: var(--text-main);
            width: 100%;
            min-width: 360px;
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        .container {
            padding: 20px;
            position: relative;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border);
            position: relative;
        }

        .header::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 50%;
            transform: translateX(-50%);
            width: 50px;
            height: 2px;
            background: var(--primary);
            box-shadow: 0 0 10px var(--primary);
        }

        h3 {
            color: var(--primary);
            margin: 0;
            font-size: 18px;
            letter-spacing: 2px;
            text-shadow: 0 0 10px var(--primary-glow);
        }

        .creator {
            color: var(--danger);
            font-size: 12px;
            margin-top: 8px;
            font-weight: bold;
            letter-spacing: 1px;
            text-shadow: 0 0 5px rgba(255, 0, 85, 0.4);
        }

        .box {
            background: var(--panel-bg);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            border: 1px solid var(--border);
            border-left: 3px solid var(--primary);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(5px);
        }

        .label {
            color: var(--text-muted);
            font-size: 11px;
            margin-bottom: 5px;
            font-weight: bold;
            letter-spacing: 0.5px;
        }

        .value {
            color: var(--secondary);
            font-size: 13px;
            font-weight: bold;
            word-wrap: break-word;
            line-height: 1.4;
        }

        button {
            width: 100%;
            padding: 12px;
            background: rgba(0, 229, 255, 0.05);
            color: var(--primary);
            border: 1px solid var(--primary);
            font-family: 'Consolas', monospace;
            font-weight: bold;
            font-size: 13px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: 0.5s;
        }

        button:hover::before {
            left: 100%;
        }

        button:hover {
            background: var(--primary);
            color: var(--btn-hover-text);
            box-shadow: 0 0 15px var(--primary-glow);
            transform: translateY(-2px);
        }

        input[type="text"],
        input[type="password"],
        select {
            width: 100%;
            padding: 12px;
            background: var(--input-bg);
            color: var(--primary);
            border: 1px solid var(--border);
            border-radius: 6px;
            margin-bottom: 12px;
            font-family: 'Consolas', monospace;
            font-size: 12px;
            font-weight: bold;
            outline: none;
            box-sizing: border-box;
            transition: all 0.3s;
        }

        input:focus,
        select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 10px var(--primary-glow);
            background: rgba(0, 229, 255, 0.05);
        }

        select {
            cursor: pointer;
        }

        optgroup {
            background: var(--bg-color);
            color: var(--warning);
        }

        option {
            background: var(--bg-color);
            color: var(--secondary);
        }

        /* Tùy chỉnh màu sắc từng nút cho đúng yêu cầu (giữ nguyên cấu trúc id) */
        #btn-copy-hwid {
            border-color: var(--warning);
            color: var(--warning);
            padding: 8px;
            font-size: 12px;
            background: rgba(255, 183, 77, 0.05);
        }

        #btn-copy-hwid:hover {
            background: var(--warning);
            color: var(--btn-hover-text);
            box-shadow: 0 0 15px rgba(255, 183, 77, 0.4);
        }

        #key-input {
            border-bottom: 2px solid var(--danger);
            text-align: center;
            font-size: 13px;
        }

        #key-input:focus {
            border-color: var(--danger);
            box-shadow: 0 0 10px rgba(255, 0, 85, 0.4);
        }

        #btn-login {
            border-color: var(--danger);
            color: var(--danger);
            background: rgba(255, 0, 85, 0.05);
        }

        #btn-login:hover {
            background: var(--danger);
            color: #fff;
            box-shadow: 0 0 15px rgba(255, 0, 85, 0.4);
        }

        #apply-btn {
            background: rgba(0, 255, 65, 0.1);
            border-color: var(--secondary);
            color: var(--secondary);
            font-size: 14px;
            flex: 1;
        }

        #apply-btn:hover {
            background: var(--secondary);
            color: var(--btn-hover-text);
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.4);
        }

        .flex-row {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
        }

        #crypto-btn {
            border-color: var(--purple);
            color: var(--purple);
            background: rgba(179, 0, 255, 0.05);
            flex: 1;
        }

        #crypto-btn:hover {
            background: var(--purple);
            color: #fff;
            box-shadow: 0 0 15px rgba(179, 0, 255, 0.4);
        }

        #crypto-settings-btn {
            border-color: var(--warning);
            color: var(--warning);
            background: rgba(255, 183, 77, 0.05);
            width: 48px;
            font-size: 20px;
            padding: 0;
        }

        #crypto-settings-btn:hover {
            background: var(--warning);
            color: var(--btn-hover-text);
            box-shadow: 0 0 15px rgba(255, 183, 77, 0.4);
        }

        #crypto-settings-box {
            border-left-color: var(--warning);
            display: none;
        }

        #save-crypto-btn {
            border-color: var(--secondary);
            color: var(--secondary);
            background: rgba(0, 255, 65, 0.05);
            padding: 10px;
        }

        #save-crypto-btn:hover {
            background: var(--secondary);
            color: var(--btn-hover-text);
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.4);
        }

        #btn-logout {
            border-color: var(--danger);
            color: var(--danger);
            background: rgba(255, 0, 85, 0.05);
            margin-top: 5px;
        }

        #btn-logout:hover {
            background: var(--danger);
            color: #fff;
            box-shadow: 0 0 15px rgba(255, 0, 85, 0.4);
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-color);
        }

        ::-webkit-scrollbar-thumb {
            background: #374151;
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--primary);
        }

        #theme-toggle {
            width: auto;
            background: none;
            border: none;
            padding: 5px;
            box-shadow: none;
            position: absolute;
            top: 15px;
            right: 15px;
            z-index: 100;
        }

        #theme-toggle::before {
            display: none;
        }

        #theme-toggle:hover {
            background: none;
            box-shadow: none;
            transform: scale(1.1);
        }
    </style>
</head>

<body>
    <div class="container">
        <button id="theme-toggle" title="Chuyển đổi Sáng/Tối">🌞</button>
        <!-- MÀN HÌNH ĐĂNG NHẬP -->
        <div id="login-view" style="display: none;">
            <div class="header">
                <div style="display: flex; justify-content: center; align-items: center; gap: 10px;">
                    <h3>[Browser]</h3>
                    <div class="creator" style="margin-top: 0;">Created by 12A2</div>
                </div>
            </div>

            <div class="box" style="text-align: center; border-left-color: var(--warning);">
                <div class="label">&gt; MÃ TRÌNH DUYỆT CỦA BẠN &lt;</div>
                <div class="value" id="hwid-display"
                    style="font-size: 16px; margin: 15px 0; color: var(--warning); letter-spacing: 1px;">
                    Đang tải...
                </div>
                <button id="btn-copy-hwid">COPY MÃ TRÌNH DUYỆT</button>
            </div>

            <div style="margin-top: 20px;">
                <input type="text" id="key-input" placeholder="Nhập Key kích hoạt vào đây..." autocomplete="off">
                <button id="btn-login">&gt; XÁC NHẬN KÍCH HOẠT &lt;</button>
            </div>

            <div id="login-status"
                style="text-align: center; font-size: 12px; margin-top: 15px; font-weight: bold; color: var(--danger); min-height: 15px;">
            </div>
        </div>

        <!-- MÀN HÌNH LÀM VIỆC CHÍNH -->
        <div id="main-view" style="display: none;">
            <div class="header">
                <div style="display: flex; justify-content: center; align-items: center; gap: 10px;">
                    <h3>[Browser]</h3>
                    <div class="creator" style="margin-top: 0;">Created by 12A2</div>
                </div>
                <div id="key-expiry-display"
                    style="color: var(--primary); font-size: 12px; margin-top: 10px; font-weight: bold;">
                    ⏳ Hạn Key: Đang tải...
                </div>
            </div>

            <div class="box">
                <label class="label" style="display:block; margin-bottom: 8px;">&gt; Lựa chọn:</label>
                <select id="profile-select">
                    <option value="random">Type 1 - ALL Browser</option>
                    <option value="random_noise">Type 2 - Only Chrome</option>
                    <option value="windows_pc">Type 3 - Desktop PC</option>
                    <option value="random_kiwi">Type 4 - Kiwi / Mobile</option>
                </select>
            </div>

            <div class="flex-row">
                <button id="apply-btn">SET</button>
                <button id="crypto-btn">CRYPTOLINK</button>
                <button id="crypto-settings-btn" title="Cài đặt tài khoản">⚙</button>
            </div>

            <div class="box" id="crypto-settings-box">
                <div class="label"
                    style="color: var(--warning); text-align: center; margin-bottom: 12px; font-size: 12px;">CÀI ĐẶT TÀI
                    KHOẢN CRYPTO</div>
                <input type="text" id="crypto-email" placeholder="Email...">
                <input type="password" id="crypto-pass" placeholder="Password...">
                <button id="save-crypto-btn">LƯU TÀI KHOẢN</button>
            </div>

            <button id="btn-logout">[ ĐĂNG XUẤT KEY ]</button>
        </div>
    </div>
    <script src="popup.js"></script>
</body>

</html>
