<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fingerprint Spoofing</title>
    <style>
        :root {
            --bg-color: #090e17;
            --grid-color: rgba(0, 229, 255, 0.05);
            --primary: #00E5FF;
            --primary-glow: rgba(0, 229, 255, 0.4);
            --secondary: #00FF41;
            --danger: #FF0055;
            --warning: #ffb74d;
            --purple: #B300FF;
            --panel-bg: rgba(13, 20, 36, 0.8);
            --border: #1f2937;
        }

        body {
            font-family: 'Consolas', 'Courier New', monospace;
            background-color: var(--bg-color);
            background-image:
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 15px 15px;
            color: #c9d1d9;
            width: 360px;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        .container {
            padding: 20px;
            position: relative;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border);
            position: relative;
        }

        .header::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 50%;
            transform: translateX(-50%);
            width: 50px;
            height: 2px;
            background: var(--primary);
            box-shadow: 0 0 10px var(--primary);
        }

        h3 {
            color: var(--primary);
            margin: 0;
            font-size: 18px;
            letter-spacing: 2px;
            text-shadow: 0 0 10px var(--primary-glow);
        }

        .creator {
            color: var(--danger);
            font-size: 12px;
            margin-top: 8px;
            font-weight: bold;
            letter-spacing: 1px;
            text-shadow: 0 0 5px rgba(255, 0, 85, 0.4);
        }

        .box {
            background: var(--panel-bg);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            border: 1px solid var(--border);
            border-left: 3px solid var(--primary);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(5px);
        }

        .label {
            color: #8b949e;
            font-size: 11px;
            margin-bottom: 5px;
            font-weight: bold;
            letter-spacing: 0.5px;
        }

        .value {
            color: var(--secondary);
            font-size: 13px;
            font-weight: bold;
            word-wrap: break-word;
            line-height: 1.4;
        }

        button {
            width: 100%;
            padding: 12px;
            background: rgba(0, 229, 255, 0.05);
            color: var(--primary);
            border: 1px solid var(--primary);
            font-family: 'Consolas', monospace;
            font-weight: bold;
            font-size: 13px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: 0.5s;
        }

        button:hover::before {
            left: 100%;
        }

        button:hover {
            background: var(--primary);
            color: #000;
            box-shadow: 0 0 15px var(--primary-glow);
            transform: translateY(-2px);
        }

        input[type="text"],
        input[type="password"],
        select {
            width: 100%;
            padding: 12px;
            background: rgba(0, 0, 0, 0.4);
            color: var(--primary);
            border: 1px solid var(--border);
            border-radius: 6px;
            margin-bottom: 12px;
            font-family: 'Consolas', monospace;
            font-size: 12px;
            font-weight: bold;
            outline: none;
            box-sizing: border-box;
            transition: all 0.3s;
        }

        input:focus,
        select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 10px var(--primary-glow);
            background: rgba(0, 229, 255, 0.05);
        }

        select {
            cursor: pointer;
        }

        optgroup {
            background: #090e17;
            color: var(--warning);
        }

        option {
            background: #090e17;
            color: var(--secondary);
        }

        /* Tùy chỉnh màu sắc từng nút cho đúng yêu cầu (giữ nguyên cấu trúc id) */
        #btn-copy-hwid {
            border-color: var(--warning);
            color: var(--warning);
            padding: 8px;
            font-size: 12px;
            background: rgba(255, 183, 77, 0.05);
        }

        #btn-copy-hwid:hover {
            background: var(--warning);
            color: #000;
            box-shadow: 0 0 15px rgba(255, 183, 77, 0.4);
        }

        #key-input {
            border-bottom: 2px solid var(--danger);
            text-align: center;
            font-size: 13px;
        }

        #key-input:focus {
            border-color: var(--danger);
            box-shadow: 0 0 10px rgba(255, 0, 85, 0.4);
        }

        #btn-login {
            border-color: var(--danger);
            color: var(--danger);
            background: rgba(255, 0, 85, 0.05);
        }

        #btn-login:hover {
            background: var(--danger);
            color: #fff;
            box-shadow: 0 0 15px rgba(255, 0, 85, 0.4);
        }

        #apply-btn {
            background: rgba(0, 255, 65, 0.1);
            border-color: var(--secondary);
            color: var(--secondary);
            margin-top: 5px;
            margin-bottom: 15px;
            font-size: 14px;
        }

        #apply-btn:hover {
            background: var(--secondary);
            color: #000;
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.4);
        }

        .flex-row {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
        }

        #crypto-btn {
            border-color: var(--purple);
            color: var(--purple);
            background: rgba(179, 0, 255, 0.05);
            flex: 1;
        }

        #crypto-btn:hover {
            background: var(--purple);
            color: #fff;
            box-shadow: 0 0 15px rgba(179, 0, 255, 0.4);
        }

        #crypto-settings-btn {
            border-color: var(--purple);
            color: var(--purple);
            background: rgba(179, 0, 255, 0.05);
            width: 48px;
            font-size: 20px;
            padding: 0;
        }

        #crypto-settings-btn:hover {
            background: var(--purple);
            color: #fff;
            box-shadow: 0 0 15px rgba(179, 0, 255, 0.4);
        }

        #crypto-settings-box {
            border-left-color: var(--purple);
            display: none;
        }

        #save-crypto-btn {
            border-color: var(--secondary);
            color: var(--secondary);
            background: rgba(0, 255, 65, 0.05);
            padding: 10px;
        }

        #save-crypto-btn:hover {
            background: var(--secondary);
            color: #000;
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.4);
        }

        #btn-logout {
            border-color: var(--danger);
            color: var(--danger);
            background: rgba(255, 0, 85, 0.05);
            margin-top: 5px;
        }

        #btn-logout:hover {
            background: var(--danger);
            color: #fff;
            box-shadow: 0 0 15px rgba(255, 0, 85, 0.4);
        }

        .pin-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: transparent !important;
            border: none !important;
            color: #8b949e !important;
            font-size: 18px !important;
            cursor: pointer;
            padding: 5px;
            width: auto;
            box-shadow: none !important;
            z-index: 10;
        }

        .pin-btn:hover {
            color: var(--primary) !important;
            transform: scale(1.1);
            background: transparent;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-color);
        }

        ::-webkit-scrollbar-thumb {
            background: #374151;
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--primary);
        }
    </style>
</head>

<body>
    <div class="container">
        <button id="btn-pin-popup" class="pin-btn"
            title="Ghim thành cửa sổ riêng (Không bị đóng khi bấm ra ngoài)">📌</button>

        <!-- MÀN HÌNH ĐĂNG NHẬP -->
        <div id="login-view" style="display: none;">
            <div class="header">
                <h3>[ Đẹp trai có gì sai ]</h3>
                <div class="creator">Extension created by 12A2</div>
            </div>

            <div class="box" style="text-align: center; border-left-color: var(--warning);">
                <div class="label">&gt; MÃ TRÌNH DUYỆT CỦA BẠN &lt;</div>
                <div class="value" id="hwid-display"
                    style="font-size: 16px; margin: 15px 0; color: var(--warning); letter-spacing: 1px;">
                    Đang tải...
                </div>
                <button id="btn-copy-hwid">COPY MÃ TRÌNH DUYỆT</button>
            </div>

            <div style="margin-top: 20px;">
                <input type="text" id="key-input" placeholder="Nhập Key kích hoạt vào đây..." autocomplete="off">
                <button id="btn-login">&gt; XÁC NHẬN KÍCH HOẠT &lt;</button>
            </div>

            <div id="login-status"
                style="text-align: center; font-size: 12px; margin-top: 15px; font-weight: bold; color: var(--danger); min-height: 15px;">
            </div>
        </div>

        <!-- MÀN HÌNH LÀM VIỆC CHÍNH -->
        <div id="main-view" style="display: none;">
            <div class="header">
                <h3>[ Browser ]</h3>
                <div class="creator">Created by 11A2</div>
                <div id="key-expiry-display"
                    style="color: var(--primary); font-size: 12px; margin-top: 10px; font-weight: bold;">
                    ⏳ Hạn Key: Đang tải...
                </div>
                <div id="ip-info-display"
                    style="color: #8b949e; font-size: 10px; margin-top: 12px; text-align: left; background: rgba(0,0,0,0.3); padding: 8px 10px; border-radius: 6px; border: 1px dashed #374151; display: none; line-height: 1.6;">
                    <div style="display: grid; grid-template-columns: auto 1fr; column-gap: 10px; align-items: center;">
                        <span>IPv4 now:</span> <span id="ipv4-current"
                            style="color:var(--secondary); word-break: break-all;">Đang tải...</span>
                        <span>IPv4 old:</span> <span id="ipv4-old"
                            style="color:var(--warning); word-break: break-all;">Trống</span>
                        <span>IPv6 now:</span> <span id="ipv6-current"
                            style="color:var(--primary); word-break: break-all;">Đang tải...</span>
                        <span>IPv6 old:</span> <span id="ipv6-old"
                            style="color:var(--warning); word-break: break-all;">Trống</span>
                    </div>
                </div>
            </div>

            <div class="box">
                <label class="label" style="display:block; margin-bottom: 8px;">&gt; Lựa chọn:</label>
                <select id="profile-select">
                    <optgroup label="[ Loại 1: All Browser ]">
                        <option value="random">Random 1</option>
                    </optgroup>
                    <optgroup label="[ Loại 2: Only Chrome ]">
                        <option value="random_noise">Random 2</option>
                    </optgroup>
                </select>
                <button id="apply-btn">&gt; ÁP DỤNG CẤU HÌNH &lt;</button>
            </div>

            <div class="flex-row">
                <button id="crypto-btn">&gt; CRYPTOLINK &lt;</button>
                <button id="crypto-settings-btn" title="Cài đặt tài khoản">⚙</button>
            </div>

            <div class="box" id="crypto-settings-box">
                <div class="label"
                    style="color: var(--purple); text-align: center; margin-bottom: 12px; font-size: 12px;">CÀI ĐẶT TÀI
                    KHOẢN CRYPTO</div>
                <input type="text" id="crypto-email" placeholder="Email...">
                <input type="password" id="crypto-pass" placeholder="Password...">
                <button id="save-crypto-btn">LƯU TÀI KHOẢN</button>
            </div>

            <button id="btn-logout">[ ĐĂNG XUẤT KEY ]</button>
        </div>
    </div>
    <script src="popup.js"></script>
</body>

</html>
